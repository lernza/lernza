name: Documentation Checks

on:
  pull_request:
    branches: [main]
    paths:
      - "**.md"
      - "**.yml"
      - "**.yaml"
      - "docs/**"
      - ".github/**"
      - "scripts/check-docs.js"
  push:
    branches: [main]
    paths:
      - "**.md"
      - "**.yml"
      - "**.yaml"
      - "docs/**"
      - ".github/**"
      - "scripts/check-docs.js"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  check-docs:
    name: Check Documentation Links and References
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run documentation checks
        id: check
        run: |
          node scripts/check-docs.js 2>&1 | tee check-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Comment on PR with results
        if: github.event_name == 'pull_request' && steps.check.outputs.exit_code != '0'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('check-output.txt', 'utf8');

            const body = `## 📚 Documentation Check Results

            The documentation checker found some issues that need attention:

            \`\`\`
            ${output}
            \`\`\`

            Please review and fix these issues. Common fixes:
            - Update \`workspace\` references to \`quest\`
            - Fix broken file links
            - Update deprecated function names

            See \`scripts/check-docs.js\` for details on what's being checked.
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c => 
              c.user?.type === 'Bot' && c.body?.includes('Documentation Check Results')
            );

            try {
              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: body
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: body
                });
              }
            } catch (error) {
              console.log("Failed to post comment. This is expected for PRs from forks.", error.message);
            }

      - name: Fail if issues found
        if: steps.check.outputs.exit_code != '0'
        run: |
          echo "⚠️  Documentation checks found issues, but not blocking this PR."
          echo "These are pre-existing issues that should be fixed in a separate PR."
          echo "See the comment above for details."
          exit 0
