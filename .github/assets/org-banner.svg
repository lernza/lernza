<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="400" fill="#FFFFFF"/>

  <!-- Top accent -->
  <rect width="1200" height="8" fill="#FACC15"/>
  <rect y="8" width="1200" height="3" fill="#000"/>

  <!-- Bottom accent -->
  <rect y="389" width="1200" height="3" fill="#000"/>
  <rect y="392" width="1200" height="8" fill="#FACC15"/>

  <!-- ═══ Main card with YELLOW shadow (signature twist) ═══ -->
  <rect x="210" y="58" width="790" height="290" fill="#FACC15"/>
  <rect x="200" y="48" width="790" height="290" fill="#FFF" stroke="#000" stroke-width="4"/>

  <!-- ── Card content ── -->

  <!-- Title -->
  <text
    x="595" y="118"
    text-anchor="middle"
    fill="#000"
    font-size="64"
    font-weight="900"
    letter-spacing="-2"
  >Lernza</text>

  <!-- Yellow divider bar -->
  <rect x="420" y="138" width="350" height="6" fill="#FACC15"/>
  <rect x="418" y="136" width="350" height="6" fill="#000"/>

  <!-- Description -->
  <text
    x="595" y="178"
    text-anchor="middle"
    fill="#555"
    font-size="18"
    font-weight="500"
  >The first learn-to-earn platform on Stellar</text>

  <!-- Three feature columns -->
  <!-- Column 1: Create -->
  <g>
    <rect x="280" y="210" width="32" height="32" fill="#000" transform="translate(3,3)"/>
    <rect x="280" y="210" width="32" height="32" fill="#FACC15" stroke="#000" stroke-width="2"/>
    <rect x="288" y="218" width="16" height="16" fill="none" stroke="#000" stroke-width="2"/>
    <rect x="293" y="223" width="6" height="6" fill="#000"/>
    <text x="296" y="264" text-anchor="middle" fill="#000" font-size="14" font-weight="800">Create Quests</text>
    <text x="296" y="282" text-anchor="middle" fill="#888" font-size="12" font-weight="500">Define learning paths</text>
  </g>

  <!-- Column 2: Milestones -->
  <g>
    <rect x="579" y="210" width="32" height="32" fill="#000" transform="translate(3,3)"/>
    <rect x="579" y="210" width="32" height="32" fill="#FACC15" stroke="#000" stroke-width="2"/>
    <!-- Checkmark -->
    <path d="M 588 228 L 593 233 L 603 221" stroke="#000" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="595" y="264" text-anchor="middle" fill="#000" font-size="14" font-weight="800">Set Milestones</text>
    <text x="595" y="282" text-anchor="middle" fill="#888" font-size="12" font-weight="500">Verifiable goals</text>
  </g>

  <!-- Column 3: Earn -->
  <g>
    <rect x="878" y="210" width="32" height="32" fill="#000" transform="translate(3,3)"/>
    <rect x="878" y="210" width="32" height="32" fill="#FACC15" stroke="#000" stroke-width="2"/>
    <!-- Star shape simplified as diamond -->
    <polygon points="894,216 900,226 894,236 888,226" fill="#000"/>
    <text x="894" y="264" text-anchor="middle" fill="#000" font-size="14" font-weight="800">Earn Tokens</text>
    <text x="894" y="282" text-anchor="middle" fill="#888" font-size="12" font-weight="500">Rewarded on-chain</text>
  </g>

  <!-- Footer inside card -->
  <text
    x="595" y="322"
    text-anchor="middle"
    fill="#AAA"
    font-size="12"
    font-weight="700"
    letter-spacing="2"
  >OPEN SOURCE · MIT LICENSE · BUILT ON STELLAR</text>

  <!-- ═══ Decorative blocks outside card ═══ -->

  <!-- Top-left cluster -->
  <g transform="rotate(-10, 105, 85)">
    <rect x="65" y="50" width="65" height="65" fill="#000" transform="translate(5,5)"/>
    <rect x="65" y="50" width="65" height="65" fill="#FACC15" stroke="#000" stroke-width="3"/>
  </g>
  <rect x="140" y="30" width="30" height="30" fill="#000" transform="translate(3,3)"/>
  <rect x="140" y="30" width="30" height="30" fill="#FACC15" stroke="#000" stroke-width="2"/>
  <g transform="rotate(6, 62, 155)">
    <rect x="45" y="140" width="34" height="34" fill="#000" transform="translate(3,3)"/>
    <rect x="45" y="140" width="34" height="34" fill="#FACC15" stroke="#000" stroke-width="2"/>
  </g>

  <!-- Bottom-right cluster -->
  <g transform="rotate(12, 1100, 290)">
    <rect x="1065" y="258" width="60" height="60" fill="#000" transform="translate(5,5)"/>
    <rect x="1065" y="258" width="60" height="60" fill="#FACC15" stroke="#000" stroke-width="3"/>
  </g>
  <rect x="1040" y="340" width="28" height="28" fill="#000" transform="translate(3,3)"/>
  <rect x="1040" y="340" width="28" height="28" fill="#FACC15" stroke="#000" stroke-width="2"/>
  <g transform="rotate(-8, 1142, 220)">
    <rect x="1125" y="205" width="30" height="30" fill="#000" transform="translate(3,3)"/>
    <rect x="1125" y="205" width="30" height="30" fill="#FACC15" stroke="#000" stroke-width="2"/>
  </g>

  <!-- Top-right accent -->
  <rect x="1090" y="45" width="22" height="22" fill="#000" transform="translate(3,3)"/>
  <rect x="1090" y="45" width="22" height="22" fill="#FACC15" stroke="#000" stroke-width="2"/>

  <!-- Bottom-left accent -->
  <g transform="rotate(5, 110, 325)">
    <rect x="85" y="305" width="42" height="42" fill="#000" transform="translate(4,4)"/>
    <rect x="85" y="305" width="42" height="42" fill="#FACC15" stroke="#000" stroke-width="2.5"/>
  </g>
  <rect x="50" y="260" width="20" height="20" fill="#000" transform="translate(2,2)"/>
  <rect x="50" y="260" width="20" height="20" fill="#FACC15" stroke="#000" stroke-width="2"/>
</svg>
