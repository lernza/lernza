<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="420" fill="#FFFFFF"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- FRONTEND BAR                                -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="86" y="26" width="1040" height="68" fill="#000" transform="translate(6,6)"/>
  <rect x="80" y="20" width="1040" height="68" fill="#FACC15" stroke="#000" stroke-width="3"/>
  <text x="600" y="52" text-anchor="middle" fill="#000" font-size="20" font-weight="900" letter-spacing="2">FRONTEND</text>
  <text x="600" y="74" text-anchor="middle" fill="#000" font-size="13" font-weight="500" opacity="0.6">React 19 + TypeScript + Vite + Freighter</text>

  <!-- ── Connecting lines: Frontend → Contracts ── -->
  <line x1="260" y1="94" x2="260" y2="148" stroke="#000" stroke-width="2.5"/>
  <polygon points="253,148 260,160 267,148" fill="#000"/>
  <line x1="600" y1="94" x2="600" y2="148" stroke="#000" stroke-width="2.5"/>
  <polygon points="593,148 600,160 607,148" fill="#000"/>
  <line x1="940" y1="94" x2="940" y2="148" stroke="#000" stroke-width="2.5"/>
  <polygon points="933,148 940,160 947,148" fill="#000"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- CONTRACT BOXES                              -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- ── Quest Contract ── -->
  <g>
    <rect x="126" y="166" width="270" height="165" fill="#000" transform="translate(5,5)"/>
    <rect x="120" y="160" width="270" height="165" fill="#FFF" stroke="#000" stroke-width="3"/>
    <!-- Header -->
    <rect x="120" y="160" width="270" height="38" fill="#FACC15" stroke="#000" stroke-width="3"/>
    <text x="255" y="184" text-anchor="middle" fill="#000" font-size="15" font-weight="900" letter-spacing="1">QUEST CONTRACT</text>
    <!-- Bullets -->
    <rect x="140" y="214" width="8" height="8" fill="#FACC15" stroke="#000" stroke-width="1"/>
    <text x="158" y="222" fill="#333" font-size="14" font-weight="600">Create quests</text>
    <rect x="140" y="240" width="8" height="8" fill="#FACC15" stroke="#000" stroke-width="1"/>
    <text x="158" y="248" fill="#333" font-size="14" font-weight="600">Enroll learners</text>
    <rect x="140" y="266" width="8" height="8" fill="#FACC15" stroke="#000" stroke-width="1"/>
    <text x="158" y="274" fill="#333" font-size="14" font-weight="600">Manage members</text>
    <!-- Test count -->
    <text x="255" y="310" text-anchor="middle" fill="#999" font-size="11" font-weight="700">10 tests</text>
  </g>

  <!-- ── Milestone Contract ── -->
  <g>
    <rect x="466" y="166" width="270" height="165" fill="#000" transform="translate(5,5)"/>
    <rect x="460" y="160" width="270" height="165" fill="#FFF" stroke="#000" stroke-width="3"/>
    <rect x="460" y="160" width="270" height="38" fill="#FACC15" stroke="#000" stroke-width="3"/>
    <text x="595" y="184" text-anchor="middle" fill="#000" font-size="15" font-weight="900" letter-spacing="1">MILESTONE CONTRACT</text>
    <rect x="480" y="214" width="8" height="8" fill="#FACC15" stroke="#000" stroke-width="1"/>
    <text x="498" y="222" fill="#333" font-size="14" font-weight="600">Define goals</text>
    <rect x="480" y="240" width="8" height="8" fill="#FACC15" stroke="#000" stroke-width="1"/>
    <text x="498" y="248" fill="#333" font-size="14" font-weight="600">Verify completion</text>
    <rect x="480" y="266" width="8" height="8" fill="#FACC15" stroke="#000" stroke-width="1"/>
    <text x="498" y="274" fill="#333" font-size="14" font-weight="600">Track progress</text>
    <text x="595" y="310" text-anchor="middle" fill="#999" font-size="11" font-weight="700">12 tests</text>
  </g>

  <!-- ── Rewards Contract ── -->
  <g>
    <rect x="806" y="166" width="270" height="165" fill="#000" transform="translate(5,5)"/>
    <rect x="800" y="160" width="270" height="165" fill="#FFF" stroke="#000" stroke-width="3"/>
    <rect x="800" y="160" width="270" height="38" fill="#FACC15" stroke="#000" stroke-width="3"/>
    <text x="935" y="184" text-anchor="middle" fill="#000" font-size="15" font-weight="900" letter-spacing="1">REWARDS CONTRACT</text>
    <rect x="820" y="214" width="8" height="8" fill="#FACC15" stroke="#000" stroke-width="1"/>
    <text x="838" y="222" fill="#333" font-size="14" font-weight="600">Fund token pool</text>
    <rect x="820" y="240" width="8" height="8" fill="#FACC15" stroke="#000" stroke-width="1"/>
    <text x="838" y="248" fill="#333" font-size="14" font-weight="600">Distribute rewards</text>
    <rect x="820" y="266" width="8" height="8" fill="#FACC15" stroke="#000" stroke-width="1"/>
    <text x="838" y="274" fill="#333" font-size="14" font-weight="600">Track earnings</text>
    <text x="935" y="310" text-anchor="middle" fill="#999" font-size="11" font-weight="700">11 tests</text>
  </g>

  <!-- ── Connecting lines: Contracts → Blockchain ── -->
  <line x1="260" y1="330" x2="260" y2="352" stroke="#000" stroke-width="2.5"/>
  <line x1="600" y1="330" x2="600" y2="352" stroke="#000" stroke-width="2.5"/>
  <line x1="940" y1="330" x2="940" y2="352" stroke="#000" stroke-width="2.5"/>
  <!-- Horizontal merge line -->
  <line x1="260" y1="352" x2="940" y2="352" stroke="#000" stroke-width="2.5"/>
  <!-- Down to blockchain -->
  <line x1="600" y1="352" x2="600" y2="362" stroke="#000" stroke-width="2.5"/>
  <polygon points="593,362 600,374 607,362" fill="#000"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- BLOCKCHAIN BAR                              -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="86" y="381" width="1040" height="38" fill="#000" transform="translate(5,3)"/>
  <rect x="80" y="375" width="1040" height="38" fill="#000" stroke="#000" stroke-width="3"/>
  <text x="600" y="400" text-anchor="middle" fill="#FACC15" font-size="16" font-weight="900" letter-spacing="3">STELLAR BLOCKCHAIN</text>
</svg>
