name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Detect what changed ──────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      contracts: ${{ steps.filter.outputs.contracts }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            contracts:
              - 'contracts/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            docs:
              - 'docs/**'

  # ── Naming guard: prevent stale workspace references ────────────
  naming-guard:
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.contracts == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check for stale workspace references in docs/
        if: needs.changes.outputs.docs == 'true'
        run: |
          # Exit with error if '\bworkspace\b' pattern found in docs/
          # Allowed: cargo commands, ADR (which documents the transition)
          if grep -rn '\bworkspace\b' docs/ 2>/dev/null | \
             grep -v 'cargo test --workspace' | \
             grep -v 'docs/adr/' | \
             grep -v '\.cargo\|/target\|/node_modules'; then
            echo "ERROR: Found stale 'workspace' references in docs/"
            echo ""
            echo "Please replace 'workspace' with 'quest' in docs/ files."
            echo "Exceptions:"
            echo "  - cargo test --workspace commands are allowed"
            echo "  - docs/adr/ references are allowed (they document the transition)"
            exit 1
          fi
          echo "No stale workspace references found in docs/"

      - name: Check for stale workspace references in code
        run: |
          # Fail if a bare-word 'workspace' (case-sensitive, regex \bworkspace\b)
          # appears in Rust contract source or TypeScript frontend source
          # outside the small intentional allowlist below.
          #
          # Allowlisted (legitimate post-rename surface):
          #   - frontend/src/components/workspace-redirect.tsx — backward-compat
          #     redirect component for old /workspace/:id URLs.
          #   - The single line in routes.tsx that imports WorkspaceRedirect and
          #     the route definition `path: "workspace/:id"` that wires it up.
          #   - frontend/src/lib/mock-data.test.ts — test descriptions still use
          #     the word "workspace" because the underlying constant is still
          #     MOCK_WORKSPACES (rename tracked separately).
          #
          # Anything else — comments, doc-comments, identifiers, string literals,
          # event symbols, log lines — should use "quest" naming.
          MATCHES=$(grep -rEn --include='*.rs' --include='*.ts' --include='*.tsx' \
              '\bworkspace\b' contracts/ frontend/src/ 2>/dev/null \
            | grep -v '/components/workspace-redirect\.tsx:' \
            | grep -v '/routes\.tsx:.*workspace-redirect' \
            | grep -v '/routes\.tsx:.*"workspace/:id"' \
            | grep -v '/lib/mock-data\.test\.ts:' || true)
          if [ -n "$MATCHES" ]; then
            echo "ERROR: Found stale 'workspace' references in contract/frontend source:"
            echo ""
            echo "$MATCHES"
            echo ""
            echo "Replace 'workspace' with 'quest' in code. The few intentional"
            echo "uses (the legacy /workspace/:id redirect and MOCK_WORKSPACES"
            echo "test descriptions) are allowlisted in this job — extend the"
            echo "allowlist in .github/workflows/ci.yml only if you are adding"
            echo "another deliberate backward-compat surface."
            exit 1
          fi
          echo "No stale workspace references found in contracts/ or frontend/src/"

  # ── Frontend: lint + type-check + build ──────────────────────────
  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.12.0
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Test (with coverage)
        run: pnpm run test -- --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: frontend/coverage/
          retention-days: 14

      - name: Type-check & build
        run: pnpm run build

      - name: Analyze bundle size
        id: bundle
        run: |
          cd dist
          TOTAL_SIZE=$(du -sh . | cut -f1)
          ASSETS_SIZE=$(du -sh assets | cut -f1)
          echo "total_size=$TOTAL_SIZE" >> $GITHUB_OUTPUT
          echo "assets_size=$ASSETS_SIZE" >> $GITHUB_OUTPUT

      - name: Comment bundle size
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { total_size, assets_size } = process.env;
            const body = `## 📦 Bundle Size Report\n\n| Metric | Size |\n|--------|------|\n| Total dist | ${total_size} |\n| Assets | ${assets_size} |\n\n_This helps track frontend bundle size changes._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user?.type === 'Bot' && c.body?.includes('Bundle Size Report')
            );

            try {
              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: body
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: body
                });
              }
            } catch (error) {
              console.log("Failed to post bundle size comment.", error.message);
            }
        env:
          total_size: ${{ steps.bundle.outputs.total_size }}
          assets_size: ${{ steps.bundle.outputs.assets_size }}

  # ── Contracts: fmt + clippy + test + build WASM ──────────────────
  # Matrix covers Linux and macOS to catch platform-specific divergence.
  contracts:
    needs: changes
    if: needs.changes.outputs.contracts == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install stellar-cli (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/releases/download/v25.2.0/stellar-cli-25.2.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Install stellar-cli (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/releases/download/v25.2.0/stellar-cli-25.2.0-x86_64-apple-darwin.tar.gz \
            | tar xz -C /usr/local/bin

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown,wasm32v1-none
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Smoke-check test module syntax
        run: cargo check --workspace --tests

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Build WASM contracts
        run: stellar contract build

      - name: Check contract WASM sizes (Linux)
        if: runner.os == 'Linux'
        run: |
          # Per-contract size budgets (bytes). Adjust as contracts grow.
          declare -A BUDGETS=(
            ["certificate.wasm"]=$((100 * 1024))
            ["milestone.wasm"]=$((150 * 1024))
            ["quest.wasm"]=$((150 * 1024))
            ["rewards.wasm"]=$((100 * 1024))
          )
          DEFAULT_BUDGET=$((256 * 1024))
          FAILED=0

          echo "=== Contract WASM Size Report ==="
          for wasm in target/wasm32v1-none/release/*.wasm; do
            [ -f "$wasm" ] || continue
            SIZE=$(stat -c%s "$wasm")
            SIZE_KB=$(echo "scale=2; $SIZE / 1024" | bc)
            NAME=$(basename "$wasm")
            BUDGET=${BUDGETS[$NAME]:-$DEFAULT_BUDGET}
            BUDGET_KB=$(echo "scale=2; $BUDGET / 1024" | bc)

            if [ "$SIZE" -gt "$BUDGET" ]; then
              echo "FAIL $NAME: ${SIZE_KB}KB (EXCEEDS ${BUDGET_KB}KB budget)"
              FAILED=1
            else
              echo "OK   $NAME: ${SIZE_KB}KB / ${BUDGET_KB}KB budget"
            fi
          done

          echo "================================="
          if [ "$FAILED" -eq 1 ]; then
            echo "One or more contracts exceed their per-contract size budget."
            exit 1
          fi

      - name: Check contract WASM sizes (macOS)
        if: runner.os == 'macOS'
        run: |
          # Per-contract size budgets (bytes). Adjust as contracts grow.
          declare -A BUDGETS=(
            ["certificate.wasm"]=$((100 * 1024))
            ["milestone.wasm"]=$((150 * 1024))
            ["quest.wasm"]=$((150 * 1024))
            ["rewards.wasm"]=$((100 * 1024))
          )
          DEFAULT_BUDGET=$((256 * 1024))
          FAILED=0

          echo "=== Contract WASM Size Report ==="
          for wasm in target/wasm32v1-none/release/*.wasm; do
            [ -f "$wasm" ] || continue
            SIZE=$(stat -f%z "$wasm")
            SIZE_KB=$(echo "scale=2; $SIZE / 1024" | bc)
            NAME=$(basename "$wasm")
            BUDGET=${BUDGETS[$NAME]:-$DEFAULT_BUDGET}
            BUDGET_KB=$(echo "scale=2; $BUDGET / 1024" | bc)

            if [ "$SIZE" -gt "$BUDGET" ]; then
              echo "FAIL $NAME: ${SIZE_KB}KB (EXCEEDS ${BUDGET_KB}KB budget)"
              FAILED=1
            else
              echo "OK   $NAME: ${SIZE_KB}KB / ${BUDGET_KB}KB budget"
            fi
          done

          echo "================================="
          if [ "$FAILED" -eq 1 ]; then
            echo "One or more contracts exceed their per-contract size budget."
            exit 1
          fi

      - name: Upload WASM artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: contracts-wasm
          path: target/wasm32v1-none/release/*.wasm
          retention-days: 14

  # ── Security: cargo-deny advisory check ───────────────────────────
  # Fails the build if security advisories are detected in dependencies.
  # See: https://github.com/EmbarkStudios/cargo-deny-action
  security:
    needs: changes
    if: needs.changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check advisories
          arguments: --config deny.toml

  # ── WASM size delta comment ───────────────────────────────────────
  # Builds the WASM on the base branch and the PR branch, computes the
  # per-contract delta vs. budget, and posts a summary comment on the PR.
  wasm-size:
    needs: changes
    if: needs.changes.outputs.contracts == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Install stellar-cli
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/releases/download/v25.2.0/stellar-cli-25.2.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable
          target: wasm32v1-none

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-wasm-size-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-size-

      # Build base branch WASM
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Build base WASM
        working-directory: base
        run: stellar contract build

      - name: Record base WASM sizes
        working-directory: base
        run: |
          mkdir -p /tmp/wasm-sizes
          for wasm in target/wasm32v1-none/release/*.wasm; do
            [ -f "$wasm" ] || continue
            NAME=$(basename "$wasm")
            SIZE=$(stat -c%s "$wasm")
            echo "$SIZE" > "/tmp/wasm-sizes/base_${NAME}.size"
          done

      # Build PR branch WASM
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: head

      - name: Build PR WASM
        working-directory: head
        run: stellar contract build

      - name: Compute delta and post comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const wasmDir = 'head/target/wasm32v1-none/release';
            const sizeDir = '/tmp/wasm-sizes';

            // Per-contract budgets in bytes (keep in sync with contracts job).
            const BUDGETS = {
              'certificate.wasm': 100 * 1024,
              'milestone.wasm':   150 * 1024,
              'quest.wasm':       150 * 1024,
              'rewards.wasm':     100 * 1024,
            };
            const DEFAULT_BUDGET = 256 * 1024;

            let rows = '';
            let hasFiles = false;

            const wasmFiles = fs.readdirSync(wasmDir).filter(f => f.endsWith('.wasm'));
            for (const name of wasmFiles) {
              hasFiles = true;
              const headSize = fs.statSync(path.join(wasmDir, name)).size;
              const baseFile = path.join(sizeDir, `base_${name}.size`);
              const budget = BUDGETS[name] ?? DEFAULT_BUDGET;
              const budgetKB = (budget / 1024).toFixed(2);
              const overBudget = headSize > budget;
              const statusIcon = overBudget ? '🔴 over' : '🟢 ok';

              let baseSize = null;
              if (fs.existsSync(baseFile)) {
                baseSize = parseInt(fs.readFileSync(baseFile, 'utf8').trim(), 10);
              }

              const headKB = (headSize / 1024).toFixed(2);
              if (baseSize === null) {
                rows += `| \`${name}\` | ${budgetKB} KB | — | ${headKB} KB | new | ${statusIcon} |\n`;
              } else {
                const delta = headSize - baseSize;
                const deltaKB = (Math.abs(delta) / 1024).toFixed(2);
                const sign = delta > 0 ? '+' : delta < 0 ? '-' : '+/-';
                const icon = delta > 0 ? '⬆️' : delta < 0 ? '⬇️' : '➡️';
                rows += `| \`${name}\` | ${budgetKB} KB | ${(baseSize / 1024).toFixed(2)} KB | ${headKB} KB | ${icon} ${sign}${deltaKB} KB | ${statusIcon} |\n`;
              }
            }

            if (!hasFiles) return;

            const body = [
              '## WASM Size Delta',
              '',
              '| Contract | Budget | Base | PR | Delta | Status |',
              '|----------|--------|------|----|-------|--------|',
              rows.trim(),
              '',
              '_Release builds (wasm32v1-none) via `stellar contract build`._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user?.type === 'Bot' && c.body?.includes('WASM Size Delta')
            );

            try {
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            } catch (error) {
              console.log('Could not post WASM size comment (fork PR):', error.message);
            }

  # ── Frontend: E2E tests with Playwright ─────────────────────────
  e2e:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.12.0
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env.local for dev server
        run: cp .env.example .env.local

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── Frontend: Lighthouse CI for Web Vitals ────────────────────────
  lighthouse:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.12.0
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for production
        run: pnpm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12.6.2
        with:
          urls: |
            http://localhost:5173
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./lighthouserc.json
          budgetPath: ./budget.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
