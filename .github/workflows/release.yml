name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install stellar-cli
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/releases/download/v25.2.0/stellar-cli-25.2.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown,wasm32v1-none

      - name: Build optimized WASM contracts
        run: stellar contract build

      - name: Generate release notes
        id: notes
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          echo "range=$RANGE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/wasm32-unknown-unknown/release/*.wasm
          body: |
            ## Compiled Contracts

            WASM binaries are attached below. Deploy them to Stellar using:

            ```bash
            stellar contract deploy --wasm <file>.wasm --network testnet --source <identity>
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
