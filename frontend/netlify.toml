[build]
  command = "pnpm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers for Content Security Policy and other protections
[[headers]]
  for = "/*"
  [headers.values]
    # Content Security Policy - Comprehensive protection against XSS and data injection
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'nonce-%nonce%' https://vercel.app;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net;
      font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net;
      img-src 'self' data: blob: https:;
      connect-src 'self' https://soroban-testnet.stellar.org https://soroban-futurenet.stellar.org https://horizon-testnet.stellar.org https://vercel.app;
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
      upgrade-insecure-requests;
    """
    
    # Additional security headers
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-XSS-Protection = "1; mode=block"